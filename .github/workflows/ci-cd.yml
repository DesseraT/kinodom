name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check formatting (Prettier)
        run: npx prettier --check src/

      - name: Run Linters (Oxlint & ESLint)
        run: npm run lint

      - name: Run Unit Tests (Vitest Placeholder)
        run: echo "==== Запуск Unit-тестов ===="

      - name: Run E2E Tests (Playwright Placeholder)
        run: echo "==== Запуск E2E-тестов ===="

      - name: Build project (Type-check & Vite build)
        run: npm run build
